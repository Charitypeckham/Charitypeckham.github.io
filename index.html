<!DOCTYPE html>
<html>
  <head>
    <base href="/" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />

    <!-- ✅ Title + Description (Google snippet) -->
    <title>Community Beavers</title>
    <meta
      name="description"
      content="At Community Beavers, we believe the game of golf is more than just a sport—it’s a powerful way to bring people together for a greater purpose. Our mission is to combine the love of the game with the spirit of giving, creating opportunities to raise essential funds and awareness for meaningful causes."
    />
    <meta name="robots" content="index,follow" />

    <!-- ✅ Canonical (helps Google) -->
    <link rel="canonical" href="https://communitybeavers.org/" />

    <!-- ✅ Open Graph (WhatsApp/Facebook/LinkedIn preview) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Community Beavers" />
    <meta property="og:title" content="Community Beavers" />
    <meta
      property="og:description"
      content="Community Beavers events raising funds and awareness for meaningful causes."
    />
    <meta property="og:url" content="https://communitybeavers.org/" />

    <!-- IMPORTANT: This should be a real 1200x630 image (not just an icon) -->
    <meta
      property="og:image"
      content="https://communitybeavers.org/icons/Icon-512.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- ✅ Twitter Card preview -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Community Beavers" />
    <meta
      name="twitter:description"
      content="Community Beavers events raising funds and awareness for meaningful causes."
    />
    <meta
      name="twitter:image"
      content="https://communitybeavers.org/icons/Icon-512.png"
    />

    <!-- ✅ iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Community Beavers" />
    <link rel="apple-touch-icon" href="/icons/Icon-192.png" />

    <!-- ✅ Favicons (Google-proof: ROOT first) -->
    <!-- Put these files in /web so they deploy to site root:
         /web/favicon.ico
         /web/favicon.png
    -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/Icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/Icon-512.png" />

    <!-- ✅ Manifest -->
    <link rel="manifest" href="manifest.json" />

    <!-- 🌈 Strong Visible Scrollbar -->
    <style>
      /* Chrome, Edge, Safari */
      ::-webkit-scrollbar {
        width: 18px; /* make scrollbar area wide */
      }

      ::-webkit-scrollbar-track {
        background: #f3f3f3;
      }

      /* The moving thumb */
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #0d47a1 0%, #1976d2 100%);
        border-radius: 10px;
        border: 2px solid #f3f3f3;
        box-shadow: 0 0 6px rgba(0, 0, 0, 0.4); /* shadow for contrast */
      }

      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #002171 0%, #0d47a1 100%);
        box-shadow: 0 0 8px rgba(0, 0, 0, 0.6);
      }

      /* Firefox */
      * {
        scrollbar-width: thick;
        scrollbar-color: #0d47a1 #f3f3f3;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        overflow-y: scroll;
        background-color: #ffffff;
      }
    </style>
  </head>

  <body>
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
